name: Back4app Auto Redeploy

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  redeploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Run Redeploy Script
        env:
          B4A_EMAIL: ${{ secrets.B4A_EMAIL }}
          B4A_PASSWORD: ${{ secrets.B4A_PASSWORD }}
        run: |
          cat > redeploy.js << 'EOF'
          const { chromium } = require('playwright');

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage();

            try {
              console.log('正在导航到登录页面...');
              await page.goto('https://back4app.com/login?return-url=https%3A%2F%2Fcontainers.back4app.com%2Fapps', {
                waitUntil: 'networkidle',
                timeout: 30000
              });

              console.log('正在输入邮箱...');
              await page.fill('input[type="email"]', process.env.B4A_EMAIL);
              
              console.log('正在输入密码...');
              await page.fill('input[type="password"]', process.env.B4A_PASSWORD);

              // 精确定位：找包含邮箱输入框的表单内的提交按钮，避免点到 Google/Github 按钮
              console.log('点击登录按钮...');
              await page.locator('form button[type="submit"], form button:has-text("Continue")').last().click();

              console.log('等待跳转到应用列表...');
              await page.waitForURL('**/apps**', { timeout: 30000 });
              await page.waitForLoadState('networkidle');

              console.log('查找并点击 myapp...');
              await page.click('text=myapp', { timeout: 15000 });

              console.log('等待应用详情页加载...');
              await page.waitForLoadState('networkidle');
              await page.waitForTimeout(2000);

              console.log('检查是否存在 Redeploy App 按钮...');
              const redeployBtn = page.locator('button:has-text("Redeploy App"), a:has-text("Redeploy App")').first();
              
              const isVisible = await redeployBtn.isVisible().catch(() => false);
              
              if (isVisible) {
                console.log('找到 Redeploy App 按钮，点击中...');
                await redeployBtn.click();
                await page.waitForTimeout(3000);
                console.log('✅ Redeploy 已触发成功！');
              } else {
                console.log('⏭️ 未找到 Redeploy App 按钮，跳过。');
              }

            } catch (error) {
              console.error('❌ 发生错误:', error.message);
              await page.screenshot({ path: 'error-screenshot.png', fullPage: true });
              process.exit(1);
            } finally {
              await browser.close();
            }
          })();
          EOF
          node redeploy.js

      - name: Upload error screenshot (if any)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshot
          path: error-screenshot.png
          retention-days: 3
